<!DOCTYPE html>
<html>
<head>
<title>Registration Form</title>

<script>

function validateForm()
{
    var userid=document.getElementById("userid").value;
    var name=document.getElementById("name").value;
    var password=document.getElementById("password").value;
    var email=document.getElementById("email").value;

    // User ID validation
    if(userid.length<5 || userid.length>12)
    {
        alert("User ID should be between 5 and 12 characters");
        return false;
    }

    // Name validation
    var namePattern=/^[A-Za-z ]+$/;

    if(!namePattern.test(name) || name.length<15)
    {
        alert("Name should contain only alphabets and minimum 15 characters");
        return false; 
    }

    // Password validation
    var passPattern=/^(?=.*[A-Z])(?=.*[@#$%^&*!])(?=.*[A-Za-z0-9]).{8,}$/;

    if(!passPattern.test(password))
    {
        alert("Password must contain at least 8 characters, one uppercase letter and one special character");
        return false;
    }

    // Email validation
    var emailPattern=/^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    if(!emailPattern.test(email))
    {
        alert("Invalid Email Address");
        return false;
    }

    alert("Registration Successful");

}

</script>

</head>

<body>

<h2>Registration Form</h2>

<form>

User ID :
<input type="text" id="userid" />
<br /><br />

Name :
<input type="text" id="name" />
<br /><br />

Password :
<input type="password" id="password" />
<br /><br />

E-mail :
<input type="text" id="email" />
<br /><br />

<input type="button"
value="Submit"
onclick="validateForm()" />

</form>

</body>
</html>
