<!DOCTYPE html>
<html>
<head>
<title>Best Two Average</title>

<script>

function calculateAverage()
{
    var regno=document.getElementById("regno").value;
    var subcode=document.getElementById("subcode").value;
    var m1=parseInt(document.getElementById("m1").value);
    var m2=parseInt(document.getElementById("m2").value);
    var m3=parseInt(document.getElementById("m3").value);

    // Validation
    if(regno=="")
    {
        alert("Enter Register Number");
        return;
    }

    if(subcode=="")
    {
        alert("Enter Subject Code");
        return;
    }

    if(isNaN(m1) || isNaN(m2) || isNaN(m3))
    {
        alert("Enter marks in all three tests");
        return;
    }

    if(m1<0 || m1>100 || m2<0 || m2>100 || m3<0 || m3>100)
    {
        alert("Marks should be between 0 and 100");
        return;
    }

    // Find average of best two tests

    var total;

    if(m1<=m2 && m1<=m3)
        total=m2+m3;

    else if(m2<=m1 && m2<=m3)
        total=m1+m3;

    else
        total=m1+m2;

    var avg=total/2;

    alert("Average Marks = "+avg);

}

</script>

</head>

<body>

<h2>Student Marks Form</h2>

Register Number :
<input type="text" id="regno">

<br><br>

Subject Code :
<input type="text" id="subcode">

<br><br>

Test 1 Marks :
<input type="text" id="m1">

<br><br>

Test 2 Marks :
<input type="text" id="m2">

<br><br>

Test 3 Marks :
<input type="text" id="m3">

<br><br>

<button onclick="calculateAverage()">
Compute Average
</button>

</body>
</html>
